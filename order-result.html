<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款結果 — 球友體育用品社</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    .sub { color: #666; font-size: .95rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .info-box {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      text-align: left;
      font-size: .88rem;
      color: #444;
      line-height: 2;
    }
    .info-box span { color: #111; font-weight: 600; }
    .btn {
      display: inline-block;
      background: #c0392b;
      color: #fff;
      padding: .75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      transition: background .2s;
    }
    .btn:hover { background: #a93226; }
    .btn.secondary {
      background: #eee;
      color: #333;
      margin-left: .5rem;
    }
    .btn.secondary:hover { background: #ddd; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1>處理中…</h1>
    <p class="sub">正在確認付款結果，請稍候。</p>
  </div>

  <script>
    // 綠界用 POST 帶參數過來，用 JS 讀取
    // 同時也支援 GET（例如直接瀏覽這個頁面）
    function getParams() {
      // 先試 sessionStorage（前端轉存）
      const stored = sessionStorage.getItem('ecpayResult');
      if (stored) {
        sessionStorage.removeItem('ecpayResult');
        return Object.fromEntries(new URLSearchParams(stored));
      }
      // GET 參數
      return Object.fromEntries(new URLSearchParams(location.search));
    }

    function render(params) {
      const card = document.getElementById('card');
      const rtnCode = params.RtnCode || params.rtncode;
      const tradeNo = params.MerchantTradeNo || params.merchanttradeno || '';
      const amt     = params.TradeAmt || params.tradeamt || '';
      const msg     = params.RtnMsg || params.rtnmsg || '';

      if (rtnCode === '1') {
        card.innerHTML = `
          <div class="icon">✅</div>
          <h1>付款成功！</h1>
          <p class="sub">感謝您的訂購，我們將盡快為您安排出貨。</p>
          ${tradeNo ? `<div class="info-box">
            訂單編號：<span>${tradeNo}</span><br>
            付款金額：<span>NT$ ${amt}</span>
          </div>` : ''}
          <a href="/" class="btn">繼續購物</a>
        `;
      } else if (rtnCode) {
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>付款失敗</h1>
          <p class="sub">${msg || '付款未完成，請重新嘗試或聯繫我們。'}</p>
          <a href="/" class="btn">回首頁</a>
          <a href="javascript:history.back()" class="btn secondary">重試</a>
        `;
      } else {
        // 沒有參數，可能是直接瀏覽
        card.innerHTML = `
          <div class="icon">🛍️</div>
          <h1>球友體育用品社</h1>
          <p class="sub">感謝您的光臨！</p>
          <a href="/" class="btn">前往購物</a>
        `;
      }
    }

    // 頁面載入時處理
    window.addEventListener('DOMContentLoaded', () => {
      const params = getParams();
      render(params);
    });
  </script>
</body>
</html>
